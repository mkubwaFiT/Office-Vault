name: Build & Release (Windows)

# Auto-builds the Windows .exe on a cloud Windows runner and publishes it as a
# release asset. Triggers when a version tag (v*) is pushed; can also be run
# manually (build artifact only, no release) via the Actions tab.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Run core tests
        run: python -m unittest discover -s tests -v

      - name: Build (onedir, no UPX) from spec
        run: pyinstaller --noconfirm Trove.spec

      - name: Sanity check the build
        shell: pwsh
        run: |
          if (-not (Test-Path dist/Trove/Trove.exe)) { throw "exe was not produced" }
          if (-not (Test-Path dist/Trove/_internal/_sqlite3.pyd)) { throw "sqlite3 missing from build" }
          Write-Host "Build OK: exe + sqlite3 present"

      - name: Verify the exe runs (real Windows)
        shell: pwsh
        run: |
          $exe = "dist/Trove/Trove.exe"
          # 1) Deterministic self-check of the FROZEN runtime (sqlite/FTS, extraction, Tk).
          $p = Start-Process -FilePath $exe -ArgumentList "--selftest" -PassThru -Wait
          if (Test-Path "$env:TEMP\trove_selftest.txt") { Write-Host "---- self-test report ----"; Get-Content "$env:TEMP\trove_selftest.txt" }
          if ($p.ExitCode -ne 0) { throw "self-test FAILED (exit $($p.ExitCode))" }
          Write-Host "Self-test passed (exit 0)."
          # 2) Launch the real GUI and confirm it starts and survives (no startup crash).
          $g = Start-Process -FilePath $exe -PassThru
          Start-Sleep -Seconds 8
          # 3) Screenshot the desktop (captures the running Trove window) -> artifact.
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          try {
            Add-Type -AssemblyName System.Windows.Forms, System.Drawing
            $vs  = [System.Windows.Forms.SystemInformation]::VirtualScreen
            $bmp = New-Object System.Drawing.Bitmap $vs.Width, $vs.Height
            $gfx = [System.Drawing.Graphics]::FromImage($bmp)
            $gfx.CopyFromScreen($vs.Location, [System.Drawing.Point]::Empty, $vs.Size)
            $bmp.Save("$PWD\artifacts\trove-windows.png", [System.Drawing.Imaging.ImageFormat]::Png)
            $gfx.Dispose(); $bmp.Dispose()
            Write-Host "Screenshot saved ($($vs.Width)x$($vs.Height))."
          } catch { Write-Host "Screenshot capture failed: $_" }
          if ($g.HasExited) { throw "GUI exited early (exit $($g.ExitCode)) — startup crash" }
          Write-Host "GUI launched and stayed alive (pid $($g.Id)). Stopping it."
          Stop-Process -Id $g.Id -Force

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Trove-windows-screenshot
          path: artifacts/trove-windows.png
          if-no-files-found: warn

      # On a release (tag) build, commit the freshly-captured screenshot back to
      # main so the README always shows the current release. Only runs if the
      # verification above succeeded. GITHUB_TOKEN pushes don't retrigger CI.
      - name: Refresh README screenshot on main (releases only)
        if: ${{ success() && startsWith(github.ref, 'refs/tags/v') }}
        shell: pwsh
        run: |
          if (-not (Test-Path artifacts/trove-windows.png)) { Write-Host "no screenshot; skipping"; exit 0 }
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          Copy-Item artifacts/trove-windows.png assets/trove-windows.png -Force
          git add assets/trove-windows.png
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) { Write-Host "screenshot unchanged; nothing to commit"; exit 0 }
          git commit -m "docs: refresh README screenshot for ${{ github.ref_name }} [skip ci]"
          git push origin main
          Write-Host "README screenshot refreshed on main for ${{ github.ref_name }}."

      - name: Package zip + checksum
        id: pkg
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^v') { $tag = "dev-" + $env:GITHUB_SHA.Substring(0,7) }
          $zip = "Trove-$tag-windows-x64.zip"
          Compress-Archive -Path dist/Trove -DestinationPath $zip -Force
          $sha = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
          "$sha  $zip" | Out-File -Encoding ascii "$zip.sha256"
          "zip=$zip"   | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "sha=$sha"   | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Packaged $zip  (SHA-256 $sha)"

      - name: Upload build artifact (every run)
        uses: actions/upload-artifact@v4
        with:
          name: Trove-windows-x64
          path: |
            ${{ steps.pkg.outputs.zip }}
            ${{ steps.pkg.outputs.zip }}.sha256

      - name: Publish release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $zip = "${{ steps.pkg.outputs.zip }}"
          $sha = "${{ steps.pkg.outputs.sha }}"
          $notes = @"
          Automated Windows x64 build of Trove $tag.

          **Download:** ``$zip`` — extract the whole folder and run ``Trove/Trove.exe`` (keep the ``_internal`` folder beside it). First launch may show a SmartScreen notice (unsigned) -> More info -> Run anyway.

          **SHA-256** (``$zip``):
          ``````
          $sha
          ``````

          See CHANGELOG.md for what changed in this version.
          "@
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $zip "$zip.sha256" --clobber
            gh release edit $tag --notes "$notes" --latest
          } else {
            gh release create $tag $zip "$zip.sha256" --title "Trove $tag" --notes "$notes" --latest
          }
          Write-Host "Published release $tag"
